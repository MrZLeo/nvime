name: ci

on:
  push:
    tags:
      - "v*.*.*.*"
  schedule:
    - cron: "0 0 1 * *"

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      version: ${{ steps.prepare.outputs.version }}
      release_ref: ${{ steps.prepare.outputs.release_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master

      - name: Resolve release version
        id: prepare
        shell: bash
        run: bash scripts/ci-prepare-release.sh

  smoke:
    if: needs.prepare.outputs.should_release == 'true'
    name: Smoke (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Install Neovim stable
        shell: bash
        run: bash scripts/ci-install-nvim.sh

      - name: Run smoke test
        shell: bash
        run: bash scripts/ci-smoke.sh

  package:
    if: needs.prepare.outputs.should_release == 'true'
    name: Package (${{ matrix.os }})
    needs:
      - prepare
      - smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Install Neovim stable
        shell: bash
        run: bash scripts/ci-install-nvim.sh

      - name: Build bundled package
        id: package
        shell: bash
        env:
          NVIME_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: bash scripts/ci-package.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.package_path }}

  release:
    if: needs.prepare.outputs.should_release == 'true'
    name: Release
    needs:
      - prepare
      - package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: nvime-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ needs.prepare.outputs.version }}
          tag_name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*
